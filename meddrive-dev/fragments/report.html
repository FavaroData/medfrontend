<div>
    <!-- Navigation Header -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <i class="fas me-2 fa-file-medical"></i>
            <span>Laudos</span>
        </a>
        <div class="navbar-nav ms-auto">
            <!-- Custom content (for special cases like status indicators) -->
            

            <!-- Default description span -->
            <span class="navbar-text">
                <i class="fas me-2 fa-file-medical"></i>
                <span>Digitação e revisão de laudos locais</span>
            </span>
        </div>
    </div>
</nav>

    <!-- CSS (report.css) já carregado top-level em dashboard.html -->

    <div class="container-fluid">
        <!-- Alerts Container -->
        <div id="alertsContainer" class="mb-3"></div>

        <!-- Filters and Action Buttons -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="row g-2">
                    <div class="col-md-4">
                        <label for="reportStatusFilter" class="form-label">Status:</label>
                        <select id="reportStatusFilter" class="form-select">
                            <option value="AWAITING_REPORT" selected>Aguardando digitação</option>
                            <option value="IN_REVIEW">Em revisão</option>
                            <option value="APPROVED">Aprovados</option>
                            <option value="DELIVERED">Entregues</option>
                            <option value="RETRY_EXHAUSTED">Falhas (retry esgotado)</option>
                            <option value="CANCELLED">Cancelados</option>
                            <option value="ALL">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="reportDateFilter" class="form-label">Período:</label>
                        <select id="reportDateFilter" class="form-select">
                            <option value="7" selected>Últimos 7 dias</option>
                            <option value="14">Últimos 14 dias</option>
                            <option value="30">Últimos 30 dias</option>
                            <option value="60">Últimos 60 dias</option>
                            <option value="90">Últimos 90 dias</option>
                            <option value="">Todos os registros</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="d-flex justify-content-end align-items-end h-100 flex-wrap gap-2">
                    <button id="reportReviewQueueNavBtn" class="btn btn-outline-info">
                        <i class="fas fa-glasses"></i> Fila de Revisão
                    </button>
                    <button id="reportTemplatesNavBtn" class="btn btn-outline-secondary">
                        <i class="fas fa-file-alt"></i> Templates
                    </button>
                    <button id="reportRefreshBtn" class="btn btn-primary">
                        <i class="fas fa-sync"></i> Atualizar
                    </button>
                </div>
            </div>
        </div>

        <!-- Statistics Cards -->
        <div class="row mb-4">
            <div class="col-md-3"
         id="reportStatAwaitingCard">
        <div class="card stats-card bg-secondary text-white"
             style="cursor: pointer;" onclick="reportFilterByStatus(&#39;AWAITING_REPORT&#39;)">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <h6 class="card-title">Aguardando laudo</h6>
                        <h4 class="stat-number mb-0"
                            id="reportStatAwaitingValue">-</h4>
                    </div>
                    <div class="align-self-center">
                        <i class="fas fa-2x fa-hourglass-half"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
            <div class="col-md-3"
         id="reportStatReviewCard">
        <div class="card stats-card bg-primary text-white"
             style="cursor: pointer;" onclick="reportFilterByStatus(&#39;IN_REVIEW&#39;)">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <h6 class="card-title">Em revisão</h6>
                        <h4 class="stat-number mb-0"
                            id="reportStatReviewValue">-</h4>
                    </div>
                    <div class="align-self-center">
                        <i class="fas fa-2x fa-glasses"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
            <div class="col-md-3"
         id="reportStatApprovedCard">
        <div class="card stats-card bg-success text-white"
             style="cursor: pointer;" onclick="reportFilterByStatus(&#39;APPROVED&#39;)">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <h6 class="card-title">Aprovados</h6>
                        <h4 class="stat-number mb-0"
                            id="reportStatApprovedValue">-</h4>
                    </div>
                    <div class="align-self-center">
                        <i class="fas fa-2x fa-check-circle"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
            <div class="col-md-3"
         id="reportStatFailedCard">
        <div class="card stats-card bg-danger text-white"
             style="cursor: pointer;" onclick="reportFilterByStatus(&#39;RETRY_EXHAUSTED&#39;)">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <h6 class="card-title">Falhas</h6>
                        <h4 class="stat-number mb-0"
                            id="reportStatFailedValue">-</h4>
                    </div>
                    <div class="align-self-center">
                        <i class="fas fa-2x fa-times-circle"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
        </div>

        <!-- Table Title -->
        <div class="table-title-section mb-3">
            <h5 class="mb-0" id="reportListTitle"><i class="fas fa-list me-2"></i>Laudos</h5>
        </div>

        <!-- Toolbar with controls (itens por página + busca livre) -->
        <div class="table-toolbar d-flex flex-row align-items-center justify-content-between gap-3 mb-3">

        <!-- Items per page selector (left side) -->
        <div class="d-flex align-items-center gap-2">
            <label for="reportItemsPerPageSelect"
                   class="mb-0 text-nowrap"
                   style="font-size: 0.875rem;">
                Exibir:
            </label>
            <select class="form-select form-select-sm"
                    id="reportItemsPerPageSelect"
                    style="width: 140px;">
                <option value="10">10 itens</option>
                <option value="25" selected="selected">25 itens</option>
                <option value="50">50 itens</option>
                <option value="100">100 itens</option>
            </select>
        </div>

        <!-- Search Box (right side) -->
        <div class="d-flex align-items-center gap-2">
            <div style="width: 500px;">
                <div class="input-group input-group-sm">
                    <span class="input-group-text">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text"
                           class="form-control"
                           id="reportSearchInput"
                           placeholder="Buscar por paciente, procedimento, médico, accession..."
                           autocomplete="off">
                    <button class="btn btn-outline-secondary"
                            type="button"
                            id="reportClearSearchBtn"
                            style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

        <!-- Awaiting Table -->
        <div class="table-responsive">
            <table id="reportAwaitingTable" class="table table-hover">
                <thead>
                    <tr>
                        <th>Accession</th>
                        <th>Paciente</th>
                        <th>Procedimento</th>
                        <th>Executor</th>
                        <th>Data</th>
                        <th>Status</th>
                        <th>Rascunho</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- report-dashboard.js já carregado top-level em dashboard.html -->
</div>
