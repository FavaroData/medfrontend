        <!-- DICOM Worklist Module CSS -->
        <link rel="stylesheet" href="/css/dicom-worklist-8c645791af54afb74fe8e19c09cb497f.css">

        <div class="container-fluid">

        <!-- Alerts Container -->
        <div id="alertsContainer"></div>

        <!-- Filters and Actions -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="row g-2">
                    <div class="col-md-4">
                        <label for="estudoFilter" class="form-label">Estudo:</label>
                        <input type="text" id="estudoFilter" name="study" class="form-control filter" placeholder="Estudo" value="">
                    </div>
                    <div class="col-md-4">
                        <label for="modalidadeFilter" class="form-label">Modalidade:</label>
                        <input type="text" id="modalidadeFilter" name="modality" class="form-control filter" placeholder="Modalidade" value="">
                    </div>
                    <div class="col-md-4">
                        <label for="pacienteFilter" class="form-label">Paciente:</label>
                        <input type="text" id="pacienteFilter" name="patientName" class="form-control filter" placeholder="Paciente" value="">
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="d-flex justify-content-end align-items-end h-100 flex-wrap gap-2">
                    <button id="filterBtn" type="button" class="btn btn-primary">
                        <i class="fas fa-search me-1"></i> Filtrar
                    </button>
                    <button id="clearFilterBtn" type="button" class="btn btn-secondary">
                        <i class="fas fa-times me-1"></i> Limpar
                    </button>
                </div>
            </div>
        </div>

        <!-- Table Title -->
        <div class="table-title-section mb-3">
            <h5 class="mb-0"><i class="fas fa-list"></i> Lista de Trabalho</h5>
        </div>

        <!-- Toolbar with controls -->
        <div class="table-toolbar d-flex flex-row align-items-center justify-content-between gap-3 mb-3">

        <!-- Items per page selector (left side) -->
        <div class="d-flex align-items-center gap-2">
            <label for="worklistItemsPerPageSelect"
                   class="mb-0 text-nowrap"
                   style="font-size: 0.875rem;">
                Exibir:
            </label>
            <select class="form-select form-select-sm"
                    id="worklistItemsPerPageSelect"
                    style="width: 140px;">
                <option value="10">10 itens</option>
                <option value="25" selected="selected">25 itens</option>
                <option value="50">50 itens</option>
                <option value="100">100 itens</option>
            </select>
        </div>

        <!-- Search Box (right side) -->
        <div class="d-flex align-items-center gap-2">
            <div style="width: 400px;">
                <div class="input-group input-group-sm">
                    <span class="input-group-text">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text"
                           class="form-control"
                           id="worklistSearchInput"
                           placeholder="Pesquisar por paciente, nº acesso ou estudo..."
                           autocomplete="off">
                    <button class="btn btn-outline-secondary"
                            type="button"
                            id="worklistClearSearchBtn"
                            style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

        <!-- Worklist Table -->
        <div class="table-responsive">
            <table id="worklistTable" class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Data</th>
                        <th>Nº Acesso</th>
                        <th>Paciente</th>
                        <th>Modalidade</th>
                        <th>Estudo</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be loaded via AJAX -->
                </tbody>
            </table>
        </div>

        </div> <!-- End container-fluid -->
    </div>
